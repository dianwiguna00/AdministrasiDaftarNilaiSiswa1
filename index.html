<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Input Nilai Siswa</title>

<style>

body{
    font-family:Arial;
    padding:20px;
    background:#f3f5f8;
}

.toolbar{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    align-items:center;
    margin-bottom:10px;
}

.toolbar select,
.toolbar input{
    height:48px;
    font-size:20px;
    padding:0 8px;
}

.toolbar button{
    height:48px;
    padding:0 8px;
    font-size:20px;
    white-space:nowrap;
}

button{
    cursor:pointer;
}

/* Container scroll */
.table-container{
    overflow:auto;
    max-width:100%;
    max-height:80vh;
}

table{
    border-collapse:collapse;
    width:auto;
}

th,
td{
    border:1px solid #ccc;
    padding:6px 8px;
    white-space:nowrap;
    text-align:center;
    font-size:22px;
}

/* Header terkunci */
th{
    background:#0d6efd;
    color:white;
    position:sticky;
    top:0;
    z-index:10;
}

.nama{
    text-align:left;
    padding-left:8px;
    font-size:20px;
}

/* Kolom No terkunci */
.sticky-no{
    position:sticky;
    left:0;
    background:white;
    z-index:5;
}

/* Perpotongan header dan kolom No */
th.sticky-no{
    left:0;
    top:0;
    background:#0d6efd;
    color:white;
    z-index:20;
}

.nilai{
    width:80px;
    height:38px;
    font-size:22px;
    text-align:center;
}

    .btn-aktif{
    background:#198754 !important;
    color:white !important;
    transition:0.3s;
}
</style>
</head>
<body>

<h2>INPUT NILAI SISWA</h2>

<div class="toolbar">
<select id="kelas" onchange="loadSiswa()">
<option value="">Pilih Kelas</option>
<option>7A</option>
<option>7B</option>
<option>7C</option>
<option>7D</option>
<option>7E</option>
<option>7F</option>
<option>7G</option>
<option>7H</option>
<option>7I</option>

<option>8A</option>
<option>8B</option>
<option>8C</option>
<option>8D</option>
<option>8E</option>
<option>8F</option>
<option>8G</option>
<option>8H</option>

<option>9A</option>
<option>9B</option>
<option>9C</option>
<option>9D</option>
<option>9E</option>
<option>9F</option>
<option>9G</option>
<option>9H</option>
<option>9I</option>
</select>
<select id="mapel">
<option value="">Pilih Mapel</option>
<option>Pendidikan Agama</option>
<option>Bahasa Indonesia</option>
<option>Pendidikan Pancasila</option>
<option>Matematika</option>
<option>IPA</option>
<option>IPS</option>
<option>Bahasa Inggris</option>
<option>Informatika</option>
<option>PJOK</option>
<option>Seni Budaya</option>
<option>Prakarya</option>
<option>Bahasa Jawa</option>
<option>BK</option>
</select>

<input type="date" id="tanggal">

<button id="btnSimpan" onclick="simpan()">
💾 Simpan
</button>

<button id="btnDownload" onclick="downloadCSV()">
📥 Download
</button>

</div>
<div style="overflow:auto">
<div class="table-container">
<table>

<thead>
<tr>
<th class="sticky-no">No</th>
<th>NIS</th>
<th>Nama</th>
<th>L/P</th>
<th>Nilai</th>
</tr>
</thead>

<tbody id="tbody"></tbody>

</table>
</div>
</div>

<script>

const API =
"https://script.google.com/macros/s/AKfycbzv_TdqcGfQA5z1JEQGHmaUVvYBdhTxUOl7xwaO16_XKIe_RbGeMzG4J25RW-EcYNQf/exec";

let dataSiswa = [];

async function loadSiswa(){

    try{

        const kelas =
        document.getElementById("kelas").value;

        const res =
        await fetch(API + "?kelas=" + kelas);

        dataSiswa =
        await res.json();

        dataSiswa.forEach(s=>{
            s.nilai = "";
        });

        render();

    }catch(err){


    }
}

function render(){

    let html = "";

    dataSiswa.forEach((s,i)=>{

        html += `
        <tr>

        <td class="sticky-no">${s.no}</td>

        <td>${s.nis}</td>

        <td class="nama">${s.nama}</td>

        <td>${s.jk}</td>

        <td>
            <input
                type="number"
                min="0"
                max="100"
                class="nilai"
                value="${s.nilai}"
                onchange="setNilai(${i},this.value)">
        </td>

        </tr>
        `;
    });

    document.getElementById("tbody").innerHTML = html;
}

function setNilai(i,nilai){

    dataSiswa[i].nilai = nilai;

}

async function simpan(){
flashButton("btnSimpan");
let mapel =
document.getElementById(
    "mapel"
).value;

if(!mapel){


    return;

}

let tanggal =
document.getElementById(
    "tanggal"
).value;

if(!tanggal){


    return;

}
    try{

const data = {

    mapel:
    document.getElementById("mapel").value,

    kelas:
    document.getElementById("kelas").value,

    tanggal:
    document.getElementById("tanggal").value,
    
    nilai:
    dataSiswa,

    deviceId :
(
    window.Android &&
    typeof Android.getDeviceId === "function"
)
?
Android.getDeviceId()
:
"",

deviceName :
(
    window.Android &&
    typeof Android.getDeviceName === "function"
)
?
Android.getDeviceName()
:
""

};

        const res = await fetch(API,{
            method:"POST",
            body:JSON.stringify(data)
        });

await res.text();


    }catch(err){


    }

}

window.onload = function(){

    document.getElementById("tanggal").value =
    new Date().toISOString().split("T")[0];

    loadSiswa();
}
function flashButton(id){

    const btn =
    document.getElementById(id);

    btn.classList.add("btn-aktif");

    setTimeout(()=>{
        btn.classList.remove("btn-aktif");
    },5000);

}
// ================= DOWNLOAD =================
async function downloadCSV(){
flashButton("btnDownload");
    let kelas =
    document.getElementById(
        "kelas"
    ).value;

let mapel =
document.getElementById(
    "mapel"
).value;

if(!mapel){


    return;

}
    if(!kelas){


        return;
    }

    try{

        let response =

await fetch(
    API +
    "?rekap=" +
    encodeURIComponent(kelas) +
    "&mapel=" +
    encodeURIComponent(mapel)
);

        let data =
        await response.json();

        let csv = "";

        data.forEach(row=>{

            csv +=
            row.join(";") + "\n";

        });

Android.downloadCSV(csv);

    }catch(err){


    }

}

</script>

</body>
</html>
